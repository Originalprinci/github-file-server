<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload - GitHub File Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 20px; color: #58a6ff; }
    .header a { color: #8b949e; text-decoration: none; font-size: 14px; }
    .header a:hover { color: #58a6ff; }
    .container { max-width: 600px; margin: 40px auto; padding: 24px; }
    .upload-zone { background: #161b22; border: 2px dashed #30363d; border-radius: 12px; padding: 60px 24px; text-align: center; transition: border-color 0.2s; cursor: pointer; position: relative; }
    .upload-zone.dragover { border-color: #58a6ff; background: #0d1117; }
    .upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
    .upload-zone p { color: #8b949e; margin: 4px 0; }
    .upload-zone .browse { color: #58a6ff; text-decoration: underline; cursor: pointer; }
    #file-input { display: none; }
    .form-group { margin-top: 16px; }
    .form-group label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; }
    .file-list { margin-top: 16px; }
    .file-list-item { display: flex; align-items: center; background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; }
    .file-list-item .name { flex: 1; font-size: 13px; }
    .file-list-item .size { font-size: 12px; color: #8b949e; }
    .file-list-item .remove { color: #da3633; cursor: pointer; margin-left: 12px; font-size: 16px; }
    .btn { display: block; width: 100%; margin-top: 16px; padding: 12px; background: #238636; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 12px; border-radius: 6px; display: none; }
    .result.success { display: block; background: #033a16; border: 1px solid #238636; color: #3fb950; }
    .result.error { display: block; background: #3a0404; border: 1px solid #da3633; color: #f85149; }
    .progress { margin-top: 12px; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; display: none; }
    .progress.show { display: block; }
    .progress .bar { height: 100%; background: #238636; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <div class="header">
    <span>📦</span>
    <h1>Upload Files</h1>
    <a href="/">← Back to files</a>
  </div>

  <div class="container">
    <div class="upload-zone" id="drop-zone">
      <div class="icon">📁</div>
      <p>Drag & drop files here</p>
      <p>or <span class="browse" id="browse-btn">browse files</span></p>
      <input type="file" id="file-input" multiple>
    </div>

    <ul class="file-list" id="file-list"></ul>

    <div class="form-group">
      <label for="dir">Target directory (optional, e.g. "images")</label>
      <input type="text" id="dir" placeholder="Root directory (leave empty)">
    </div>

    <button class="btn" id="upload-btn" disabled>Upload Files</button>

    <div class="progress" id="progress"><div class="bar"></div></div>
    <div class="result" id="result"></div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const browseBtn = document.getElementById('browse-btn');
    const fileList = document.getElementById('file-list');
    const uploadBtn = document.getElementById('upload-btn');
    const result = document.getElementById('result');
    const progress = document.getElementById('progress');

    let selectedFiles = [];

    browseBtn.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      addFiles(Array.from(e.dataTransfer.files));
    });

    fileInput.addEventListener('change', () => {
      addFiles(Array.from(fileInput.files));
    });

    function addFiles(files) {
      files.forEach(file => {
        if (!selectedFiles.find(f => f.name === file.name && f.size === file.size)) {
          selectedFiles.push(file);
        }
      });
      renderFileList();
    }

    function renderFileList() {
      fileList.innerHTML = selectedFiles.map((f, i) => `
        <li class="file-list-item">
          <span class="name">${f.name}</span>
          <span class="size">${(f.size / 1024).toFixed(1)} KB</span>
          <span class="remove" onclick="removeFile(${i})">✕</span>
        </li>
      `).join('');
      uploadBtn.disabled = selectedFiles.length === 0;
      uploadBtn.textContent = `Upload ${selectedFiles.length} file(s)`;
    }

    window.removeFile = function(index) {
      selectedFiles.splice(index, 1);
      renderFileList();
      fileInput.value = '';
    };

    uploadBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      const formData = new FormData();
      selectedFiles.forEach(f => formData.append('files', f));

      const dir = document.getElementById('dir').value.trim();
      if (dir) formData.append('dir', dir);

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Uploading...';
      result.className = 'result';
      result.textContent = '';
      progress.classList.add('show');

      try {
        const resp = await fetch('/upload', { method: 'POST', body: formData });
        const data = await resp.json();

        if (resp.ok) {
          result.className = 'result success';
          result.innerHTML = `✅ ${data.message}<br>${data.files.map(f => `• ${f.name} → ${f.status === 'uploaded' ? '✅' : '❌ ' + f.error}`).join('<br>')}`;
          selectedFiles = [];
          fileInput.value = '';
          renderFileList();
        } else {
          result.className = 'result error';
          result.textContent = '❌ Upload failed: ' + (data.error || resp.statusText);
        }
      } catch (err) {
        result.className = 'result error';
        result.textContent = '❌ Network error: ' + err.message;
      } finally {
        progress.classList.remove('show');
        uploadBtn.disabled = false;
        uploadBtn.textContent = `Upload ${selectedFiles.length} file(s)`;
      }
    });
  </script>
</body>
</html>
